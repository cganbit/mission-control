name: Deploy — Mission Control

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to VPS
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env' \
            ./ \
            root@${{ secrets.VPS_HOST }}:/opt/mission-control/

      - name: Update .env on VPS
        run: |
          ssh root@${{ secrets.VPS_HOST }} "cat > /opt/mission-control/.env << 'ENVEOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          DATABASE_SSL=false
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          SESSION_HOURS=24
          ML_TOKENS_PATH=/opt/ml-data/tokens.json
          FIRECRAWL_API_KEY=${{ secrets.FIRECRAWL_API_KEY }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          MC_URL=https://mc.wingx.app.br
          PRINT_AGENT_KEY=${{ secrets.PRINT_AGENT_KEY }}
          QUEUE_KEY=${{ secrets.QUEUE_KEY }}
          ENVEOF"

      - name: Build & restart container
        run: |
          ssh root@${{ secrets.VPS_HOST }} "
            cd /opt/mission-control &&
            docker compose build --no-cache &&
            docker compose up -d
          "

      - name: Health check
        run: |
          sleep 15
          curl -f https://mc.wingx.app.br/api/health || exit 1
