name: Deploy — Mission Control

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check previous deploy status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV=$(gh api repos/${{ github.repository }}/actions/workflows/deploy.yml/runs \
            --jq '.workflow_runs | map(select(.id != ${{ github.run_id }})) | .[0] | {status: .conclusion, id: .id, url: .html_url}' 2>/dev/null || echo '{}')
          STATUS=$(echo "$PREV" | jq -r '.status // "none"')
          if [ "$STATUS" = "failure" ]; then
            echo "::warning::⚠️ Deploy anterior FALHOU ($(echo $PREV | jq -r '.url')). Continuando com cautela."
          fi

      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.VPS_SSH_KEY }}" ] && MISSING="$MISSING VPS_SSH_KEY"
          [ -z "${{ secrets.VPS_HOST }}" ] && MISSING="$MISSING VPS_HOST"
          [ -z "${{ secrets.DATABASE_URL }}" ] && MISSING="$MISSING DATABASE_URL"
          [ -z "${{ secrets.EVOLUTION_URL }}" ] && MISSING="$MISSING EVOLUTION_URL"
          [ -z "${{ secrets.EVOLUTION_INSTANCE }}" ] && MISSING="$MISSING EVOLUTION_INSTANCE"
          [ -z "${{ secrets.EVOLUTION_API_KEY }}" ] && MISSING="$MISSING EVOLUTION_API_KEY"
          [ -z "${{ secrets.SRE_WHATSAPP_GROUP }}" ] && MISSING="$MISSING SRE_WHATSAPP_GROUP"
          if [ -n "$MISSING" ]; then
            echo "::warning::Secrets ausentes:$MISSING — SRE WhatsApp alert NÃO funcionará sem eles."
          fi
          # Bloqueante apenas para secrets críticos de deploy
          [ -z "${{ secrets.VPS_SSH_KEY }}" ] && echo "::error::VPS_SSH_KEY é obrigatório" && exit 1
          [ -z "${{ secrets.VPS_HOST }}" ] && echo "::error::VPS_HOST é obrigatório" && exit 1
          [ -z "${{ secrets.DATABASE_URL }}" ] && echo "::error::DATABASE_URL é obrigatório" && exit 1
          echo "✅ Secrets validados"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Validate build (TypeScript + Next.js)
        run: |
          npm ci --prefer-offline
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to VPS
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env' \
            ./ \
            root@${{ secrets.VPS_HOST }}:/opt/mission-control/

      - name: Update .env on VPS
        run: |
          ssh root@${{ secrets.VPS_HOST }} "cat > /opt/mission-control/.env << 'ENVEOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          DATABASE_SSL=false
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          SESSION_HOURS=24
          ME_SENDER_DOCUMENT=${{ secrets.ME_SENDER_DOCUMENT }}
          FIRECRAWL_API_KEY=${{ secrets.FIRECRAWL_API_KEY }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          MC_URL=https://mc.wingx.app.br
          PRINT_AGENT_KEY=${{ secrets.PRINT_AGENT_KEY }}
          QUEUE_KEY=${{ secrets.QUEUE_KEY }}
          DB_ENCRYPTION_KEY=${{ secrets.DB_ENCRYPTION_KEY }}
          MC_WORKER_KEY=${{ secrets.WORKER_KEY }}
          SRE_WHATSAPP_GROUP=${{ secrets.SRE_WHATSAPP_GROUP }}
          EVOLUTION_API_KEY=${{ secrets.EVOLUTION_API_KEY }}
          N8N_API_KEY=${{ secrets.N8N_API_KEY }}
          MELHOR_ENVIO_ENV=${{ secrets.MELHOR_ENVIO_ENV }}
          ME_SANDBOX_TOKEN=${{ secrets.ME_SANDBOX_TOKEN }}
          ME_SANDBOX_CLIENT_SECRET=${{ secrets.ME_SANDBOX_CLIENT_SECRET }}
          ME_PROD_TOKEN=${{ secrets.ME_PROD_TOKEN }}
          ME_PROD_CLIENT_SECRET=${{ secrets.ME_PROD_CLIENT_SECRET }}
          ENVEOF"

      - name: Build & restart container
        run: |
          ssh root@${{ secrets.VPS_HOST }} "
            cd /opt/mission-control &&
            docker compose build --no-cache &&
            docker compose up -d --force-recreate
          "

      - name: Health check
        run: |
          sleep 15
          curl -f https://mc.wingx.app.br/api/mercado-livre/webhook || exit 1

      - name: Smoke tests
        run: |
          BASE=https://mc.wingx.app.br
          PASS=0
          FAIL=0

          check() {
            local name="$1" url="$2" expected="$3" extra_args="${4:-}"
            status=$(curl -s -o /dev/null -w "%{http_code}" $extra_args "$url")
            if [ "$status" = "$expected" ]; then
              echo "✅ $name ($status)"
              PASS=$((PASS+1))
            else
              echo "❌ $name — esperado $expected, recebeu $status"
              FAIL=$((FAIL+1))
            fi
          }

          # Login para obter cookie JWT
          COOKIE=$(curl -s -c - -X POST "$BASE/api/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"admin\",\"password\":\"${{ secrets.ADMIN_PASSWORD }}\"}" \
            | grep mc_token | awk '{print "mc_token="$NF}')

          # Públicos
          check "health"             "$BASE/api/health"                      "200"
          check "webhook GET"        "$BASE/api/mercado-livre/webhook"        "200"
          check "print trigger (sem token)" "$BASE/api/print-queue/trigger"  "400"

          # Com QUEUE_KEY
          check "fila manage"        "$BASE/api/print-queue/manage?key=${{ secrets.QUEUE_KEY }}" "200"

          # Com JWT
          if [ -n "$COOKIE" ]; then
            check "clientes ML"      "$BASE/api/mercado-livre/clientes"       "200" "-H 'Cookie: $COOKIE'"
            check "stats ML"         "$BASE/api/mercado-livre/stats"          "200" "-H 'Cookie: $COOKIE'"
            check "SRE events"       "$BASE/api/sre/events"                   "200" "-H 'Cookie: $COOKIE'"
            check "print queue"      "$BASE/api/print-queue"                  "401" "-H 'Cookie: $COOKIE'"
          else
            echo "⚠️  Login falhou — testes JWT pulados"
            FAIL=$((FAIL+1))
          fi

          echo ""
          echo "Resultado: ✅ $PASS passou | ❌ $FAIL falhou"
          [ "$FAIL" -eq 0 ] || exit 1

      - name: Notify SRE on failure
        if: failure()
        run: |
          MSG="🔴 *Deploy falhou — Mission Control*%0A%0A"
          MSG="${MSG}*Commit:* ${{ github.sha }}%0A"
          MSG="${MSG}*Branch:* ${{ github.ref_name }}%0A"
          MSG="${MSG}*Por:* ${{ github.actor }}%0A%0A"
          MSG="${MSG}_Verifique o painel: https://mc.wingx.app.br/sre_"
          curl -s -X POST "${{ secrets.EVOLUTION_URL }}/message/sendText/${{ secrets.EVOLUTION_INSTANCE }}" \
            -H "apikey: ${{ secrets.EVOLUTION_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"number\":\"${{ secrets.SRE_WHATSAPP_GROUP }}\",\"text\":\"$(echo -e $MSG)\"}" || true
