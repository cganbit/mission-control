name: Deploy — Mission Control

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check previous deploy status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV=$(gh api repos/${{ github.repository }}/actions/workflows/deploy.yml/runs \
            --jq '.workflow_runs | map(select(.id != ${{ github.run_id }})) | .[0] | {status: .conclusion, id: .id, url: .html_url}' 2>/dev/null || echo '{}')
          STATUS=$(echo "$PREV" | jq -r '.status // "none"')
          if [ "$STATUS" = "failure" ]; then
            echo "::warning::⚠️ Deploy anterior FALHOU ($(echo $PREV | jq -r '.url')). Continuando com cautela."
          fi

      - name: Validate required secrets
        run: |
          ERRORS=""
          WARNINGS=""

          # ── Bloqueantes: app não sobe sem estes ──────────────────────────────
          [ -z "${{ secrets.VPS_SSH_KEY }}" ]      && ERRORS="$ERRORS VPS_SSH_KEY"
          [ -z "${{ secrets.VPS_HOST }}" ]          && ERRORS="$ERRORS VPS_HOST"
          [ -z "${{ secrets.DATABASE_URL }}" ]      && ERRORS="$ERRORS DATABASE_URL"
          [ -z "${{ secrets.JWT_SECRET }}" ]        && ERRORS="$ERRORS JWT_SECRET"
          [ -z "${{ secrets.ADMIN_PASSWORD }}" ]    && ERRORS="$ERRORS ADMIN_PASSWORD"
          [ -z "${{ secrets.WORKER_KEY }}" ]        && ERRORS="$ERRORS WORKER_KEY"
          [ -z "${{ secrets.DB_ENCRYPTION_KEY }}" ] && ERRORS="$ERRORS DB_ENCRYPTION_KEY"
          [ -z "${{ secrets.QUEUE_KEY }}" ]         && ERRORS="$ERRORS QUEUE_KEY"

          # ── Warnings: features degradam mas app funciona ─────────────────────
          [ -z "${{ secrets.EVOLUTION_URL }}" ]          && WARNINGS="$WARNINGS EVOLUTION_URL"
          [ -z "${{ secrets.EVOLUTION_INSTANCE }}" ]     && WARNINGS="$WARNINGS EVOLUTION_INSTANCE"
          [ -z "${{ secrets.EVOLUTION_API_KEY }}" ]      && WARNINGS="$WARNINGS EVOLUTION_API_KEY"
          [ -z "${{ secrets.SRE_WHATSAPP_GROUP }}" ]     && WARNINGS="$WARNINGS SRE_WHATSAPP_GROUP"
          [ -z "${{ secrets.N8N_API_KEY }}" ]            && WARNINGS="$WARNINGS N8N_API_KEY"
          [ -z "${{ secrets.ME_SENDER_DOCUMENT }}" ]     && WARNINGS="$WARNINGS ME_SENDER_DOCUMENT"
          [ -z "${{ secrets.FIRECRAWL_API_KEY }}" ]      && WARNINGS="$WARNINGS FIRECRAWL_API_KEY"
          [ -z "${{ secrets.PRINT_AGENT_KEY }}" ]        && WARNINGS="$WARNINGS PRINT_AGENT_KEY"
          [ -z "${{ secrets.ME_PROD_TOKEN }}" ]          && WARNINGS="$WARNINGS ME_PROD_TOKEN"
          [ -z "${{ secrets.ME_PROD_CLIENT_SECRET }}" ]  && WARNINGS="$WARNINGS ME_PROD_CLIENT_SECRET"
          [ -z "${{ secrets.MC_GITHUB_WEBHOOK_SECRET }}" ] && WARNINGS="$WARNINGS MC_GITHUB_WEBHOOK_SECRET"
          [ -z "${{ secrets.ARBITRAGEM_DATABASE_URL }}" ]  && WARNINGS="$WARNINGS ARBITRAGEM_DATABASE_URL"

          if [ -n "$WARNINGS" ]; then
            echo "::warning::Secrets ausentes (features degradadas):$WARNINGS"
          fi
          if [ -n "$ERRORS" ]; then
            echo "::error::Secrets CRÍTICOS ausentes — deploy bloqueado:$ERRORS"
            exit 1
          fi
          echo "✅ Todos os secrets críticos validados"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@wingx-app'

      - name: Install dependencies
        run: npm install --no-audit --no-fund
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        # NOTE: npm install (not npm ci) — lock file generated on Windows has invalid
        # dedup for esbuild (vite@8 wants ^0.27, lockfile deduped @0.18) + lightningcss
        # native binary (linux-x64-gnu) not installable in GH Actions from Windows lockfile.
        # Real build + validation happen in Docker build on VPS (step below).
        # Ver: docs/spikes/spike-003-lightningcss-ci-linux.md

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # ssh-keyscan via TCP/22 bloqueado do GitHub Actions runner pra VPS
          # (firewall ou rate limit). Trocado por StrictHostKeyChecking=accept-new
          # via ~/.ssh/config — aceita host key no primeiro handshake e persiste
          # em known_hosts pros próximos steps do mesmo run. Runner é descartável;
          # VPS é nosso (MITM window aceitável pra CI).
          cat > ~/.ssh/config << 'SSHCFG'
          Host *
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/known_hosts
            ServerAliveInterval 30
            ServerAliveCountMax 3
          SSHCFG
          chmod 600 ~/.ssh/config

      - name: Sync files to VPS
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env' \
            ./ \
            root@${{ secrets.VPS_HOST }}:/opt/mission-control/

      - name: Update .env on VPS
        run: |
          ssh root@${{ secrets.VPS_HOST }} "cat > /opt/mission-control/.env << 'ENVEOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          DATABASE_SSL=false
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          SESSION_HOURS=24
          ME_SENDER_DOCUMENT=${{ secrets.ME_SENDER_DOCUMENT }}
          FIRECRAWL_API_KEY=${{ secrets.FIRECRAWL_API_KEY }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          MC_URL=https://mc.wingx.app.br
          PRINT_AGENT_KEY=${{ secrets.PRINT_AGENT_KEY }}
          QUEUE_KEY=${{ secrets.QUEUE_KEY }}
          DB_ENCRYPTION_KEY=${{ secrets.DB_ENCRYPTION_KEY }}
          MC_WORKER_KEY=${{ secrets.WORKER_KEY }}
          SRE_WHATSAPP_GROUP=${{ secrets.SRE_WHATSAPP_GROUP }}
          EVOLUTION_API_KEY=${{ secrets.EVOLUTION_API_KEY }}
          N8N_API_KEY=${{ secrets.N8N_API_KEY }}
          MELHOR_ENVIO_ENV=${{ secrets.MELHOR_ENVIO_ENV }}
          ME_SANDBOX_TOKEN=${{ secrets.ME_SANDBOX_TOKEN }}
          ME_SANDBOX_CLIENT_SECRET=${{ secrets.ME_SANDBOX_CLIENT_SECRET }}
          ME_PROD_TOKEN=${{ secrets.ME_PROD_TOKEN }}
          ME_PROD_CLIENT_SECRET=${{ secrets.ME_PROD_CLIENT_SECRET }}
          MC_GITHUB_WEBHOOK_SECRET=${{ secrets.MC_GITHUB_WEBHOOK_SECRET }}
          ARBITRAGEM_DATABASE_URL=${{ secrets.ARBITRAGEM_DATABASE_URL }}
          ENVEOF"

      - name: Build & restart container
        run: |
          ssh root@${{ secrets.VPS_HOST }} "
            cd /opt/mission-control &&
            docker compose build --no-cache &&
            docker compose up -d --force-recreate
          "

      - name: Health check
        run: |
          sleep 15
          curl -f https://mc.wingx.app.br/api/mercado-livre/webhook || exit 1

      - name: Run idempotent migrations
        run: |
          BASE=https://mc.wingx.app.br
          KEY="${{ secrets.WORKER_KEY }}"

          run_setup() {
            local name="$1" path="$2"
            status=$(curl -s -o /tmp/mig.out -w "%{http_code}" -X POST "$BASE$path" \
              -H "x-worker-key: $KEY")
            if [ "$status" = "201" ] || [ "$status" = "200" ]; then
              echo "✅ $name ($status)"
            else
              echo "❌ $name — esperado 201/200, recebeu $status"
              cat /tmp/mig.out
              exit 1
            fi
          }

          run_setup "analytics schema"       "/api/analytics/setup"
          run_setup "pipeline-runs schema"   "/api/pipeline-runs/setup"
          run_setup "auth/login schema"      "/api/auth/login/setup"
          run_setup "connectors schema"      "/api/connectors/setup"
          run_setup "cron-heartbeat schema"  "/api/sre/cron-heartbeat/setup"
          run_setup "paraguai/assets schema" "/api/paraguai/assets/setup"
          run_setup "paraguai/audit schema"  "/api/paraguai/audit/setup"
          run_setup "catalogo/queue schema"  "/api/paraguai/catalogo/queue/setup"
          run_setup "catalogo/enrich schema" "/api/paraguai/catalogo/enrich/setup"
          run_setup "github webhooks schema" "/api/github/webhooks/setup"

      - name: Smoke tests
        run: |
          BASE=https://mc.wingx.app.br
          JAR=/tmp/mc-smoke-cookies.txt
          PASS=0
          FAIL=0

          check() {
            local name="$1" url="$2" expected="$3" use_cookie="${4:-}"
            if [ "$use_cookie" = "auth" ]; then
              status=$(curl -s -o /dev/null -w "%{http_code}" -b "$JAR" "$url")
            else
              status=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            fi
            if [ "$status" = "$expected" ]; then
              echo "✅ $name ($status)"
              PASS=$((PASS+1))
            else
              echo "❌ $name — esperado $expected, recebeu $status"
              FAIL=$((FAIL+1))
            fi
          }

          # Login escrevendo cookie jar (evita quoting issue de -H 'Cookie: ...')
          rm -f "$JAR"
          LOGIN_STATUS=$(curl -s -c "$JAR" -o /tmp/login.out -w "%{http_code}" \
            -X POST "$BASE/api/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"admin\",\"password\":\"${{ secrets.ADMIN_PASSWORD }}\"}")

          # Públicos
          check "health"             "$BASE/api/health"                      "200"
          check "webhook GET"        "$BASE/api/mercado-livre/webhook"        "200"
          check "print trigger (sem token)" "$BASE/api/print-queue/trigger"  "400"

          # Com QUEUE_KEY
          check "fila manage"        "$BASE/api/print-queue/manage?key=${{ secrets.QUEUE_KEY }}" "200"

          # Com JWT
          if [ "$LOGIN_STATUS" = "200" ] && [ -s "$JAR" ] && grep -q mc_token "$JAR"; then
            echo "✅ login ($LOGIN_STATUS)"
            PASS=$((PASS+1))
            check "clientes ML"      "$BASE/api/mercado-livre/clientes"       "200" "auth"
            check "stats ML"         "$BASE/api/mercado-livre/stats"          "200" "auth"
            check "SRE events"       "$BASE/api/sre/events"                   "200" "auth"
            check "print queue"      "$BASE/api/print-queue"                  "401" "auth"
            # Multi-tenant checks (C3.1-C3.4)
            check "me currentProject" "$BASE/api/auth/me"                     "200" "auth"
            check "organizations"     "$BASE/api/organizations"               "200" "auth"
            check "projects"          "$BASE/api/projects"                    "200" "auth"
          else
            echo "❌ login falhou — status=$LOGIN_STATUS, jar=$(wc -c < "$JAR" 2>/dev/null || echo 0)B"
            cat /tmp/login.out | head -c 300
            FAIL=$((FAIL+1))
          fi

          echo ""
          echo "Resultado: ✅ $PASS passou | ❌ $FAIL falhou"
          [ "$FAIL" -eq 0 ] || exit 1

      - name: Notify SRE on failure
        if: failure()
        run: |
          MSG="🔴 *Deploy falhou — Mission Control*%0A%0A"
          MSG="${MSG}*Commit:* ${{ github.sha }}%0A"
          MSG="${MSG}*Branch:* ${{ github.ref_name }}%0A"
          MSG="${MSG}*Por:* ${{ github.actor }}%0A%0A"
          MSG="${MSG}_Verifique o painel: https://mc.wingx.app.br/sre_"
          curl -s -X POST "${{ secrets.EVOLUTION_URL }}/message/sendText/${{ secrets.EVOLUTION_INSTANCE }}" \
            -H "apikey: ${{ secrets.EVOLUTION_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"number\":\"${{ secrets.SRE_WHATSAPP_GROUP }}\",\"text\":\"$(echo -e $MSG)\"}" || true
