name: Sync stack evolution-api-h4pg secrets

# Sincroniza secrets do GH com o .env do stack evolution-api-h4pg no VPS.
# Zero exposição em logs (senhas via stdin pro SSH, python3 replace seguro).
# Trigger manual (workflow_dispatch) — não roda em push.
# Usa-se após rotação de credencial (ex: rotation de senha n8n via UI) pra
# alinhar source of truth entre GH Secret ↔ .env runtime.

on:
  workflow_dispatch:
    inputs:
      sync_n8n_password:
        description: "Sync N8N_PASSWORD (senha Basic Auth n8n)"
        required: false
        type: boolean
        default: true

jobs:
  sync:
    name: Sync secrets to /docker/evolution-api-h4pg/.env
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync N8N_PASSWORD
        if: ${{ github.event.inputs.sync_n8n_password == 'true' }}
        env:
          N8N_PASSWORD: ${{ secrets.N8N_PASSWORD }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          if [ -z "$N8N_PASSWORD" ]; then
            echo "::error::GH Secret N8N_PASSWORD está vazio. Set it first."
            exit 1
          fi
          printf '%s' "$N8N_PASSWORD" | ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@$VPS_HOST '
            set -e
            NEW_PASS=$(cat)
            ENV_FILE=/docker/evolution-api-h4pg/.env
            cp "$ENV_FILE" "$ENV_FILE.bak-sync-$(date +%Y%m%d-%H%M%S)"
            export NEW_PASS
            python3 <<PYEOF
import os
new = os.environ["NEW_PASS"]
path = "/docker/evolution-api-h4pg/.env"
with open(path) as f:
    lines = f.read().splitlines()
out = []
found = False
for l in lines:
    if l.startswith("N8N_PASSWORD="):
        out.append("N8N_PASSWORD=" + new)
        found = True
    else:
        out.append(l)
if not found:
    out.append("N8N_PASSWORD=" + new)
with open(path, "w") as f:
    f.write("\n".join(out) + "\n")
PYEOF
            LINE=$(grep "^N8N_PASSWORD=" "$ENV_FILE" | head -1)
            LEN=${#LINE}
            echo ".env N8N_PASSWORD atualizado — line length=$LEN (value redacted)"
            if [ "$LEN" -lt 15 ]; then
              echo "::error::Valor suspeitamente curto. Verificar GH Secret."
              exit 1
            fi
          '

      - name: Summary
        if: always()
        run: |
          echo "::notice::Sync concluído. Backup do .env anterior preservado em /docker/evolution-api-h4pg/.env.bak-sync-<ts>"
          echo "::notice::Nota G6: n8n ignora N8N_BASIC_AUTH_PASSWORD após first-boot. Este sync alinha .env com senha runtime (que deve ter sido trocada via UI do n8n separadamente). Próximo rebuild do stack usa esta senha."
